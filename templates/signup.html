<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>AttendEase — Sign Up</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',sans-serif;min-height:100vh;background:#f8fafc;display:flex;align-items:center;justify-content:center;padding:20px;}
.box{background:#fff;border-radius:16px;box-shadow:0 4px 24px rgba(0,0,0,0.08);padding:40px;width:100%;max-width:500px;}
.logo{text-align:center;margin-bottom:24px;}
.logo h1{font-size:24px;font-weight:700;color:#0f172a;}
.logo h1 span{color:#4f46e5;}
.logo p{color:#64748b;font-size:13px;margin-top:2px;}
.form-group{margin-bottom:14px;}
.form-group label{display:block;font-size:13px;font-weight:500;color:#374151;margin-bottom:5px;}
.form-control{width:100%;padding:9px 12px;border:1px solid #e2e8f0;border-radius:8px;font-size:13.5px;font-family:'Inter',sans-serif;outline:none;transition:.2s;color:#0f172a;}
.form-control:focus{border-color:#4f46e5;box-shadow:0 0 0 3px rgba(79,70,229,0.1);}
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.role-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.role-card{border:2px solid #e2e8f0;border-radius:10px;padding:14px;text-align:center;cursor:pointer;transition:.2s;}
.role-card:hover{border-color:#4f46e5;}
.role-card input{display:none;}
.role-card i{font-size:22px;color:#94a3b8;margin-bottom:6px;display:block;}
.role-card span{font-size:12px;font-weight:500;color:#374151;}
.role-card.selected{border-color:#4f46e5;background:#eef2ff;}
.role-card.selected i{color:#4f46e5;}
.btn{width:100%;padding:11px;background:#4f46e5;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;font-family:'Inter',sans-serif;transition:.2s;margin-top:6px;}
.btn:hover{background:#3730a3;}
.link{text-align:center;margin-top:16px;font-size:13px;color:#64748b;}
.link a{color:#4f46e5;font-weight:500;text-decoration:none;}
.alert{padding:10px 14px;border-radius:8px;font-size:13px;margin-bottom:14px;background:#fef2f2;color:#991b1b;border:1px solid #fecaca;}
#class_fields{display:none;}
@media(max-width:480px){.form-row,.role-grid{grid-template-columns:1fr;}}
</style>
</head>
<body>
<div class="box">
  <div class="logo"><h1>Attend<span>Ease</span></h1><p>Create your account</p></div>
  {% if error %}<div class="alert">{{ error }}</div>{% endif %}
  <form method="POST">
    <div class="form-group">
      <label>Full Name</label>
      <input type="text" name="full_name" class="form-control" placeholder="e.g. Mrs. Priya Sharma" required/>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" class="form-control" placeholder="you@school.com" required/>
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" class="form-control" placeholder="Min 6 chars" required minlength="6"/>
      </div>
    </div>
    <div class="form-group">
      <label>Select Role</label>
      <div class="role-grid">
        <label class="role-card" onclick="selectRole(this,'class_teacher')">
          <input type="radio" name="role" value="class_teacher"/>
          <i class="fas fa-user-tie"></i><span>Class Teacher</span>
        </label>
        <label class="role-card" onclick="selectRole(this,'admin')">
          <input type="radio" name="role" value="admin"/>
          <i class="fas fa-user-shield"></i><span>Admin</span>
        </label>
      </div>
    </div>
    <div id="class_fields">
      <div class="form-row">
        <div class="form-group">
          <label>Class Name</label>
          <input type="text" name="class_name" class="form-control" placeholder="e.g. Class 10"/>
        </div>
        <div class="form-group">
          <label>Section</label>
          <input type="text" name="section" class="form-control" placeholder="e.g. A"/>
        </div>
      </div>
    </div>
    <button type="submit" class="btn">Create Account</button>
  </form>
  <div class="link">Already have an account? <a href="/login">Sign in</a></div>
</div>
<script>
function selectRole(el,role){
  document.querySelectorAll('.role-card').forEach(c=>c.classList.remove('selected'));
  el.classList.add('selected');
  el.querySelector('input').checked=true;
  document.getElementById('class_fields').style.display=role==='class_teacher'?'block':'none';
}
</script>
</body>
</html>
